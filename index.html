<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QC ข้าวมันไก่</title>
    
    <!-- นำเข้า Tailwind CSS สำหรับจัดการความสวยงาม -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- นำเข้า ฟอนต์ Prompt จาก Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- นำเข้า Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body {
            font-family: 'Prompt', sans-serif;
            background-color: #f3f4f6;
        }
        
        /* ซ่อน Scrollbar แต่ยังเลื่อนได้ */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        .view-section {
            display: none;
            flex-direction: column;
            height: 100%;
        }
        .view-section.active {
            display: flex;
        }

        /* Animation แบบฟอร์ม */
        .fade-in {
            animation: fadeIn 0.3s ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="h-screen w-full flex justify-center items-center sm:p-4 md:p-8">

    <!-- กรอบมือถือจำลอง (Mobile Frame Container) -->
    <div class="w-full h-full max-w-md bg-white sm:rounded-[2.5rem] sm:shadow-2xl overflow-hidden relative sm:border-[8px] sm:border-gray-900 flex flex-col">
        
        <!-- ========================================== -->
        <!-- 1. หน้าแรก (Home View) -->
        <!-- ========================================== -->
        <div id="view-home" class="view-section active bg-gray-50 fade-in">
            <header class="bg-red-600 text-white p-4 shadow-md sticky top-0 z-10 flex items-center justify-between">
                <h1 class="text-xl font-bold tracking-wide ml-2">QC ข้าวมันไก่</h1>
                <div class="w-8 h-8 bg-white rounded-full flex items-center justify-center shadow-inner overflow-hidden">
                    <img src="./QC/logo.jpg" alt="logo" class="w-full h-full object-cover" onerror="this.onerror=null; this.src='https://api.iconify.design/noto:rooster.svg';">
                </div>
            </header>
            
            <div class="p-6 flex-1 flex flex-col justify-center items-center w-full">
                <div class="bg-white p-8 rounded-3xl shadow-sm border border-gray-100 w-full mb-6 text-center">
                    <div class="w-20 h-20 bg-red-50 rounded-full flex items-center justify-center mx-auto mb-4 text-red-600">
                        <i data-lucide="clipboard-check" class="w-10 h-10"></i>
                    </div>
                    <h2 class="text-2xl font-bold text-gray-800 mb-2">ระบบควบคุมคุณภาพ</h2>
                    <p class="text-gray-500 text-sm mb-6">บันทึกและติดตามมาตรฐานร้าน<br/>เพื่อคุณภาพที่ดีที่สุด</p>
                    
                    <button onclick="navigateTo('form')" class="w-full bg-red-600 text-white font-bold py-4 rounded-xl shadow-lg hover:bg-red-700 active:transform active:scale-95 transition-all flex items-center justify-center gap-2">
                        <i data-lucide="clipboard-check" class="w-5 h-5"></i>
                        เริ่มตรวจคุณภาพ (QC)
                    </button>
                </div>

                <div class="w-full flex gap-3 mb-4">
                    <button onclick="navigateTo('stats')" class="flex-1 bg-white text-gray-700 font-semibold py-4 rounded-xl shadow-sm border border-gray-200 hover:bg-red-50 hover:text-red-600 active:scale-95 transition-all flex flex-col items-center justify-center gap-2">
                        <i data-lucide="bar-chart-3" class="w-6 h-6 text-red-500"></i>
                        <span class="text-sm">สถิติสาขา</span>
                    </button>
                    <button onclick="navigateTo('history')" class="flex-1 bg-white text-gray-700 font-semibold py-4 rounded-xl shadow-sm border border-gray-200 hover:bg-gray-50 active:scale-95 transition-all flex flex-col items-center justify-center gap-2">
                        <i data-lucide="history" class="w-6 h-6 text-gray-400"></i>
                        <span class="text-sm">ประวัติการตรวจ</span>
                    </button>
                </div>

                <div id="offline-warning" class="mt-4 text-xs text-orange-500 bg-orange-50 p-3 rounded-lg flex items-start gap-2 text-left">
                    <i data-lucide="alert-circle" class="w-4 h-4 mt-0.5 flex-shrink-0"></i>
                    <p>ขณะนี้ระบบทำงานในโหมด Offline (Local Storage) หากต้องการบันทึกข้อมูลจริง กรุณาตั้งค่า GOOGLE_SHEET_API_URL ในโค้ด</p>
                </div>
            </div>
        </div>

        <!-- ========================================== -->
        <!-- 2. หน้าฟอร์ม (Form View) -->
        <!-- ========================================== -->
        <div id="view-form" class="view-section bg-gray-50 fade-in relative">
            <header class="bg-red-600 text-white p-4 shadow-md sticky top-0 z-10 flex items-center justify-between">
                <div class="flex items-center">
                    <button onclick="navigateTo('home')" class="mr-3 p-1 hover:bg-red-700 rounded-full transition">
                        <i data-lucide="chevron-left" class="w-6 h-6"></i>
                    </button>
                    <h1 class="text-xl font-bold tracking-wide">แบบฟอร์มตรวจสอบ</h1>
                </div>
                <div class="w-8 h-8 bg-white rounded-full flex items-center justify-center shadow-inner overflow-hidden">
                    <img src="./QC/logo.jpg" alt="logo" class="w-full h-full object-cover" onerror="this.onerror=null; this.src='https://api.iconify.design/noto:rooster.svg';">
                </div>
            </header>

            <div class="flex-1 overflow-y-auto no-scrollbar p-4 pb-28">
                <!-- ข้อมูลเบื้องต้น -->
                <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100 mb-6">
                    <div class="mb-4">
                        <label class="flex items-center text-sm font-semibold text-gray-700 mb-2">
                            <i data-lucide="store" class="w-4 h-4 mr-2 text-red-600"></i> สาขาที่ตรวจ
                        </label>
                        <select id="input-branch" class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 text-gray-800 focus:outline-none focus:ring-2 focus:ring-red-500 transition">
                            <option value="">-- เลือกสาขา --</option>
                            <option value="สาขาอ้อมเมือง">สาขาอ้อมเมือง</option>
                            <option value="สาขาสันป่าข่อย">สาขาสันป่าข่อย</option>
                            <option value="สาขาสันทราย">สาขาสันทราย</option>
                            <option value="สาขาบ่อสร้าง">สาขาบ่อสร้าง</option>
			        <option value="สาขาต้นพยอม">สาขาต้นพยอม</option>
			        <option value="สาขากาดแม่หยวก">สาขากาดแม่หยวก</option>
                        </select>
                    </div>
                    <div>
                        <label class="flex items-center text-sm font-semibold text-gray-700 mb-2">
                            <i data-lucide="user" class="w-4 h-4 mr-2 text-red-600"></i> ชื่อผู้ตรวจ
                        </label>
                        <input type="text" id="input-auditor" placeholder="ระบุชื่อพนักงาน QC" class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 text-gray-800 focus:outline-none focus:ring-2 focus:ring-red-500 transition"/>
                    </div>
                </div>

                <h3 class="text-sm font-bold text-gray-500 mb-3 px-2 uppercase tracking-wider">คุณภาพอาหาร</h3>
                <!-- ระบบ Rating จะถูกสร้างด้วย JavaScript -->
                <div id="rating-container-food"></div>

                <h3 class="text-sm font-bold text-gray-500 mb-3 mt-6 px-2 uppercase tracking-wider">การจัดการร้าน</h3>
                <!-- ระบบ Rating จะถูกสร้างด้วย JavaScript -->
                <div id="rating-container-service"></div>

                <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100 mb-6 mt-4">
                    <label class="block text-sm font-semibold text-gray-700 mb-2">ข้อเสนอแนะเพิ่มเติม</label>
                    <textarea id="input-remark" rows="3" placeholder="ระบุปัญหาที่พบ หรือสิ่งที่ต้องปรับปรุง..." class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 text-gray-800 focus:outline-none focus:ring-2 focus:ring-red-500 transition resize-none"></textarea>
                </div>
            </div>

            <!-- ปุ่ม Submit -->
            <div class="absolute bottom-0 left-0 right-0 p-4 bg-white/90 backdrop-blur-md border-t border-gray-100 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)]">
                <button id="btn-submit" onclick="submitForm()" class="w-full bg-red-600 text-white font-bold py-4 rounded-xl shadow-lg hover:bg-red-700 active:scale-95 transition-all flex items-center justify-center gap-2">
                    <i data-lucide="save" class="w-5 h-5"></i>
                    <span>บันทึกผลตรวจสอบ</span>
                </button>
            </div>
        </div>

        <!-- ========================================== -->
        <!-- 3. หน้าประวัติ (History View) -->
        <!-- ========================================== -->
        <div id="view-history" class="view-section bg-gray-50 fade-in">
            <header class="bg-red-600 text-white p-4 shadow-md sticky top-0 z-10 flex items-center justify-between">
                <div class="flex items-center">
                    <button onclick="navigateTo('home')" class="mr-3 p-1 hover:bg-red-700 rounded-full transition">
                        <i data-lucide="chevron-left" class="w-6 h-6"></i>
                    </button>
                    <h1 class="text-xl font-bold tracking-wide">ประวัติการตรวจสอบ</h1>
                </div>
                <div class="w-8 h-8 bg-white rounded-full flex items-center justify-center shadow-inner overflow-hidden">
                    <img src="./QC/logo.jpg" alt="logo" class="w-full h-full object-cover" onerror="this.onerror=null; this.src='https://api.iconify.design/noto:rooster.svg';">
                </div>
            </header>
            <div class="flex-1 overflow-y-auto no-scrollbar p-4" id="history-container">
                <!-- ข้อมูลประวัติจะถูกเพิ่มด้วย JavaScript -->
            </div>
        </div>

        <!-- ========================================== -->
        <!-- 4. หน้าสถิติ (Stats View) -->
        <!-- ========================================== -->
        <div id="view-stats" class="view-section bg-gray-50 fade-in">
            <header class="bg-red-600 text-white p-4 shadow-md sticky top-0 z-10 flex items-center justify-between">
                <div class="flex items-center">
                    <button onclick="navigateTo('home')" class="mr-3 p-1 hover:bg-red-700 rounded-full transition">
                        <i data-lucide="chevron-left" class="w-6 h-6"></i>
                    </button>
                    <h1 class="text-xl font-bold tracking-wide">สถิติคุณภาพแต่ละสาขา</h1>
                </div>
                <div class="w-8 h-8 bg-white rounded-full flex items-center justify-center shadow-inner overflow-hidden">
                    <img src="./QC/logo.jpg" alt="logo" class="w-full h-full object-cover" onerror="this.onerror=null; this.src='https://api.iconify.design/noto:rooster.svg';">
                </div>
            </header>
            <div class="flex-1 overflow-y-auto no-scrollbar p-4" id="stats-container">
                <!-- ข้อมูลสถิติจะถูกเพิ่มด้วย JavaScript -->
            </div>
        </div>

        <!-- ========================================== -->
        <!-- Toast Notification (Popup แจ้งเตือน) -->
        <!-- ========================================== -->
        <div id="toast" class="absolute top-20 left-1/2 transform -translate-x-1/2 z-50 transition-all duration-300 opacity-0 pointer-events-none translate-y-[-20px]">
            <div id="toast-content" class="px-6 py-3 rounded-full shadow-lg text-sm font-bold flex items-center gap-2 text-white">
                <i id="toast-icon" data-lucide="check-circle" class="w-4 h-4"></i>
                <span id="toast-text">ข้อความ</span>
            </div>
        </div>
    </div>

    <!-- ========================================== -->
    <!-- ⚙️ JavaScript Core Logic -->
    <!-- ========================================== -->
    <script>
        // --- 1. การตั้งค่าระบบ ---
        // นำ URL ที่ได้จาก Google Apps Script มาใส่ที่นี่ (ปล่อยว่างไว้เพื่อทดสอบด้วยระบบ Local Storage)
        const GOOGLE_SHEET_API_URL = 'https://script.google.com/macros/s/AKfycby7UVjvmJmpLUta2mp6wkgNo0AQqWP1ChzTnRgGGnIFazZeBY75Ce5CfrWntqA5YHcc/exec'; 
        
        // --- 2. ตัวแปรเก็บสถานะ (State) ---
        let formData = {
            riceScore: 5, chickenScore: 5, soupScore: 5, sauceScore: 5, cleanScore: 5, serviceScore: 5
        };
        let historyData = [];

        // --- 3. ข้อมูลหัวข้อการให้คะแนน ---
        const ratingConfig = {
            food: [
                { id: 'riceScore', label: 'ข้าวมัน (หอม นุ่ม ร่วน ไม่แฉะ)', icon: 'utensils' },
                { id: 'chickenScore', label: 'เนื้อไก่ (นุ่ม สุกพอดี หนังตึง ไม่คาว)', icon: 'utensils' },
                { id: 'soupScore', label: 'น้ำซุป (ร้อน รสชาติกลมกล่อม)', icon: 'droplets' },
                { id: 'sauceScore', label: 'น้ำจิ้ม (รสชาติตามมาตรฐาน ไม่บูด)', icon: 'droplets' }
            ],
            service: [
                { id: 'cleanScore', label: 'ความสะอาด (ครัว, โต๊ะ, อุปกรณ์)', icon: 'star' },
                { id: 'serviceScore', label: 'การบริการ (ความรวดเร็ว, มารยาท)', icon: 'smile' }
            ]
        };

        // --- 4. ฟังก์ชันหลักเมื่อเริ่มต้น ---
        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons(); // สร้างไอคอน
            renderRatingGroups('rating-container-food', ratingConfig.food);
            renderRatingGroups('rating-container-service', ratingConfig.service);
            
            // เช็คว่ามี URL หรือไม่ เพื่อซ่อน/แสดง คำเตือนโหมดออฟไลน์
            if (GOOGLE_SHEET_API_URL) {
                document.getElementById('offline-warning').style.display = 'none';
            }
        });

        // --- 5. ฟังก์ชันเปลี่ยนหน้าจอ (Navigation) ---
        async function navigateTo(viewId) {
            document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active'));
            document.getElementById(`view-${viewId}`).classList.add('active');
            
            if(viewId === 'history' || viewId === 'stats') {
                await fetchHistoryData();
                if(viewId === 'history') renderHistory();
                if(viewId === 'stats') renderStats();
            }
        }

        // --- 6. สร้างฟอร์มให้คะแนน (Dynamic Render) ---
        function renderRatingGroups(containerId, items) {
            const container = document.getElementById(containerId);
            let html = '';
            items.forEach(item => {
                let buttonsHtml = '';
                for(let i=1; i<=5; i++) {
                    const isActive = formData[item.id] === i;
                    const activeClass = isActive ? 'bg-red-600 text-white shadow-md transform scale-105' : 'bg-gray-50 text-gray-400';
                    buttonsHtml += `<button type="button" onclick="setRating('${item.id}', ${i})" class="rating-btn-${item.id} flex-1 py-3 rounded-xl font-bold text-lg transition-all ${activeClass}">${i}</button>`;
                }
                
                html += `
                <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 mb-4">
                    <div class="flex items-center mb-3 text-gray-800 font-medium">
                        <div class="bg-red-50 p-2 rounded-lg mr-3 text-red-600">
                            <i data-lucide="${item.icon}" class="w-5 h-5"></i>
                        </div>
                        ${item.label}
                    </div>
                    <div class="flex justify-between gap-2">
                        ${buttonsHtml}
                    </div>
                    <div class="flex justify-between text-xs text-gray-400 mt-2 px-1">
                        <span>ปรับปรุงด่วน</span>
                        <span>ดีเยี่ยม</span>
                    </div>
                </div>`;
            });
            container.innerHTML = html;
            lucide.createIcons();
        }

        // --- 7. ฟังก์ชันอัพเดทคะแนนเมื่อกดปุ่ม ---
        function setRating(fieldId, value) {
            formData[fieldId] = value;
            // อัพเดท UI
            document.querySelectorAll(`.rating-btn-${fieldId}`).forEach((btn, index) => {
                if(index + 1 === value) {
                    btn.className = `rating-btn-${fieldId} flex-1 py-3 rounded-xl font-bold text-lg transition-all bg-red-600 text-white shadow-md transform scale-105`;
                } else {
                    btn.className = `rating-btn-${fieldId} flex-1 py-3 rounded-xl font-bold text-lg transition-all bg-gray-50 text-gray-400 hover:bg-red-50 hover:text-red-400`;
                }
            });
        }

        // --- 8. แจ้งเตือน Toast ---
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            const content = document.getElementById('toast-content');
            const icon = document.getElementById('toast-icon');
            const text = document.getElementById('toast-text');

            text.innerText = message;
            if(type === 'error') {
                content.className = 'px-6 py-3 rounded-full shadow-lg text-sm font-bold flex items-center gap-2 text-white bg-red-500';
                icon.setAttribute('data-lucide', 'alert-circle');
            } else {
                content.className = 'px-6 py-3 rounded-full shadow-lg text-sm font-bold flex items-center gap-2 text-white bg-gray-800';
                icon.setAttribute('data-lucide', 'check-circle');
            }
            lucide.createIcons();

            toast.classList.remove('opacity-0', 'translate-y-[-20px]');
            toast.classList.add('opacity-100', 'translate-y-0');

            setTimeout(() => {
                toast.classList.add('opacity-0', 'translate-y-[-20px]');
                toast.classList.remove('opacity-100', 'translate-y-0');
            }, 3000);
        }

        // --- 9. บันทึกข้อมูล (Submit) ---
        async function submitForm() {
            const branch = document.getElementById('input-branch').value;
            const auditor = document.getElementById('input-auditor').value.trim();
            const remark = document.getElementById('input-remark').value.trim();

            if(!branch || !auditor) {
                showToast('กรุณาระบุสาขาและชื่อผู้ตรวจ', 'error');
                return;
            }

            const btn = document.getElementById('btn-submit');
            btn.innerHTML = `<i data-lucide="loader-2" class="w-5 h-5 animate-spin"></i> <span>กำลังบันทึก...</span>`;
            btn.disabled = true;
            btn.classList.add('bg-gray-400');
            lucide.createIcons();

            const payload = {
                branch, auditor, remark,
                riceScore: formData.riceScore,
                chickenScore: formData.chickenScore,
                soupScore: formData.soupScore,
                sauceScore: formData.sauceScore,
                cleanScore: formData.cleanScore,
                serviceScore: formData.serviceScore,
                date: new Date().toISOString(),
                totalScore: formData.riceScore + formData.chickenScore + formData.soupScore + formData.sauceScore + formData.cleanScore + formData.serviceScore,
                maxScore: 30
            };

            try {
                if (GOOGLE_SHEET_API_URL) {
                    await fetch(GOOGLE_SHEET_API_URL, {
                        method: 'POST',
                        mode: 'no-cors',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                } else {
                    // Mock Offline Storage
                    const existing = JSON.parse(localStorage.getItem('qc_mock_db') || '[]');
                    localStorage.setItem('qc_mock_db', JSON.stringify([payload, ...existing]));
                }

                showToast('บันทึกผลตรวจสอบเรียบร้อยแล้ว');
                
                // Reset Form
                document.getElementById('input-auditor').value = '';
                document.getElementById('input-remark').value = '';
                formData = { riceScore: 5, chickenScore: 5, soupScore: 5, sauceScore: 5, cleanScore: 5, serviceScore: 5 };
                renderRatingGroups('rating-container-food', ratingConfig.food);
                renderRatingGroups('rating-container-service', ratingConfig.service);
                
                navigateTo('home');
            } catch (err) {
                showToast('เกิดข้อผิดพลาดในการบันทึก', 'error');
            } finally {
                btn.innerHTML = `<i data-lucide="save" class="w-5 h-5"></i> <span>บันทึกผลตรวจสอบ</span>`;
                btn.disabled = false;
                btn.classList.remove('bg-gray-400');
                lucide.createIcons();
            }
        }

        // --- 10. ดึงข้อมูลประวัติ (Fetch) ---
        async function fetchHistoryData() {
            try {
                if (GOOGLE_SHEET_API_URL) {
                    const res = await fetch(GOOGLE_SHEET_API_URL);
                    const data = await res.json();
                    historyData = data.reverse();
                } else {
                    historyData = JSON.parse(localStorage.getItem('qc_mock_db') || '[]');
                }
            } catch (err) {
                showToast('ไม่สามารถดึงข้อมูลได้', 'error');
                historyData = [];
            }
        }

        // --- 11. แสดงหน้าประวัติ (Render History) ---
        function renderHistory() {
            const container = document.getElementById('history-container');
            if(historyData.length === 0) {
                container.innerHTML = `
                    <div class="text-center text-gray-400 mt-20">
                        <i data-lucide="history" class="w-12 h-12 mx-auto mb-4 opacity-20"></i>
                        <p>ยังไม่มีประวัติการตรวจสอบ</p>
                    </div>`;
                lucide.createIcons();
                return;
            }

            let html = '<div class="space-y-4 pb-10">';
            historyData.forEach(item => {
                const percent = Math.round((item.totalScore / item.maxScore) * 100);
                const isGood = percent >= 80;
                const statusColor = isGood ? 'bg-green-50 text-green-600' : 'bg-orange-50 text-orange-600';
                const statusIcon = isGood ? 'check-circle' : 'alert-circle';
                const dateObj = new Date(item.date);
                const dateStr = `${dateObj.getDate()}/${dateObj.getMonth()+1}/${dateObj.getFullYear()} ${dateObj.getHours().toString().padStart(2,'0')}:${dateObj.getMinutes().toString().padStart(2,'0')} น.`;

                html += `
                <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100">
                    <div class="flex justify-between items-start mb-3">
                        <div>
                            <h4 class="font-bold text-gray-800 flex items-center gap-1">
                                <i data-lucide="store" class="w-4 h-4 text-red-600"></i> ${item.branch}
                            </h4>
                            <p class="text-xs text-gray-400 mt-1">${dateStr}</p>
                        </div>
                        <div class="px-3 py-1 rounded-full text-sm font-bold flex items-center gap-1 ${statusColor}">
                            <i data-lucide="${statusIcon}" class="w-4 h-4"></i> ${percent}%
                        </div>
                    </div>
                    
                    <div class="grid grid-cols-2 gap-2 text-xs text-gray-600 bg-gray-50 p-3 rounded-xl mb-3">
                        <div class="flex justify-between"><span>ข้าวมัน:</span> <b>${item.riceScore}/5</b></div>
                        <div class="flex justify-between"><span>ไก่:</span> <b>${item.chickenScore}/5</b></div>
                        <div class="flex justify-between"><span>น้ำซุป:</span> <b>${item.soupScore}/5</b></div>
                        <div class="flex justify-between"><span>น้ำจิ้ม:</span> <b>${item.sauceScore}/5</b></div>
                        <div class="flex justify-between"><span>สะอาด:</span> <b>${item.cleanScore}/5</b></div>
                        <div class="flex justify-between"><span>บริการ:</span> <b>${item.serviceScore}/5</b></div>
                    </div>
                    
                    <div class="flex justify-between items-end">
                        <div class="text-sm text-gray-500"><span class="text-xs">ผู้ตรวจ:</span> ${item.auditor}</div>
                        ${item.remark ? `<span class="text-xs bg-gray-100 text-gray-600 px-2 py-1 rounded-md max-w-[50%] truncate">"${item.remark}"</span>` : ''}
                    </div>
                </div>`;
            });
            html += '</div>';
            container.innerHTML = html;
            lucide.createIcons();
        }

        // --- 12. แสดงหน้าสถิติ (Render Stats) ---
        function renderStats() {
            const container = document.getElementById('stats-container');
            if(historyData.length === 0) {
                container.innerHTML = `
                    <div class="text-center text-gray-400 mt-20">
                        <i data-lucide="bar-chart-3" class="w-12 h-12 mx-auto mb-4 opacity-20"></i>
                        <p>ยังไม่มีข้อมูลสำหรับคำนวณสถิติ</p>
                    </div>`;
                lucide.createIcons();
                return;
            }

            // คำนวณสถิติ
            const statsObj = {};
            historyData.forEach(item => {
                if(!statsObj[item.branch]) statsObj[item.branch] = { total: 0, max: 0, count: 0 };
                statsObj[item.branch].total += item.totalScore;
                statsObj[item.branch].max += item.maxScore;
                statsObj[item.branch].count += 1;
            });

            const branchStats = Object.keys(statsObj).map(b => ({
                branch: b,
                avg: Math.round((statsObj[b].total / statsObj[b].max) * 100),
                count: statsObj[b].count
            })).sort((a,b) => b.avg - a.avg);

            let html = `
            <div class="space-y-4 pb-10">
                <div class="bg-red-600 text-white p-5 rounded-2xl shadow-md mb-6 flex items-center justify-between">
                    <div>
                        <p class="text-red-100 text-sm mb-1">จำนวนการตรวจทั้งหมด</p>
                        <h3 class="text-3xl font-bold">${historyData.length} <span class="text-lg font-normal">ครั้ง</span></h3>
                    </div>
                    <div class="w-12 h-12 bg-white/20 rounded-full flex items-center justify-center">
                        <i data-lucide="clipboard-check" class="w-6 h-6 text-white"></i>
                    </div>
                </div>
                <h3 class="text-sm font-bold text-gray-500 mb-2 px-2 uppercase tracking-wider">คะแนนเฉลี่ยรายสาขา</h3>
            `;

            branchStats.forEach((stat, idx) => {
                const isGood = stat.avg >= 80;
                const isWarning = stat.avg < 60;
                let colorClass = isGood ? 'bg-green-500' : isWarning ? 'bg-red-500' : 'bg-orange-500';
                let textColor = isGood ? 'text-green-600' : isWarning ? 'text-red-600' : 'text-orange-600';

                html += `
                <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100">
                    <div class="flex justify-between items-center mb-2">
                        <h4 class="font-bold text-gray-800 flex items-center gap-2">
                            ${idx === 0 ? '<i data-lucide="star" class="w-4 h-4 text-yellow-500 fill-current"></i>' : ''}
                            ${stat.branch}
                        </h4>
                        <span class="text-xs text-gray-400 font-medium bg-gray-100 px-2 py-1 rounded-md">ตรวจ ${stat.count} ครั้ง</span>
                    </div>
                    <div class="flex items-center gap-3 mt-3">
                        <div class="flex-1 h-3 bg-gray-100 rounded-full overflow-hidden">
                            <div class="h-full rounded-full transition-all duration-1000 ${colorClass}" style="width: ${stat.avg}%"></div>
                        </div>
                        <div class="text-sm font-bold w-10 text-right ${textColor}">${stat.avg}%</div>
                    </div>
                </div>`;
            });

            html += '</div>';
            container.innerHTML = html;
            lucide.createIcons();
        }
    </script>
</body>
</html>
